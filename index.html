<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
    --main:#b7c59a;
    --light:#dfe7d3;
}

body{
    font-family:Poppins,sans-serif;
    background:#000;
    color:#fff;
    overflow-x:hidden;
}

.background{
    position:fixed;
    inset:0;
    background:url("background.png") center/cover no-repeat;
    z-index:-3;
    animation:bgMove 16s infinite alternate ease-in-out;
}

@keyframes bgMove{
    from{transform:scale(1)}
    to{transform:scale(1.04)}
}

.overlay{
    position:fixed;
    inset:0;
    background:
    linear-gradient(to bottom,rgba(0,0,0,.08),rgba(0,0,0,.42)),
    linear-gradient(to right,rgba(0,0,0,.22),transparent,rgba(0,0,0,.18));
    z-index:-2;
}

.container{
    min-height:100vh;
    padding:40px 6%;
    display:flex;
    align-items:center;
    justify-content:flex-start;
}

.left{
    width:50%;
}

.right{
    display:none;
}

.live{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:10px 18px;
    border-radius:50px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(3px);
    margin-bottom:20px;
    font-size:13px;
}

.dot{
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--main);
    box-shadow:0 0 12px rgba(183,197,154,.6);
}

.title{
    display:flex;
    gap:5px;
    margin-bottom:10px;
}

.title span{
    font-size:92px;
    font-weight:900;
    line-height:1;
    opacity:0;
    transform:translateY(100px) scale(.5);
    animation:letterIn .7s forwards;
    text-shadow:
    0 0 10px rgba(183,197,154,.25),
    0 0 30px rgba(183,197,154,.15);
}

.title span:nth-child(1){animation-delay:.1s}
.title span:nth-child(2){animation-delay:.2s}
.title span:nth-child(3){animation-delay:.3s}
.title span:nth-child(4){animation-delay:.4s}
.title span:nth-child(5){animation-delay:.5s}
.title span:nth-child(6){animation-delay:.6s}
.title span:nth-child(7){animation-delay:.7s}

@keyframes letterIn{
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.subtitle{
    color:var(--main);
    font-size:20px;
    letter-spacing:8px;
    font-weight:900;
    margin-bottom:18px;
}

.description{
    max-width:520px;
    line-height:1.7;
    font-size:13px;
    color:#d8d8d8;
    margin-bottom:22px;
    text-shadow:0 2px 8px #000;
}

.socials{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.social{
    min-height:72px;
    display:flex;
    align-items:center;
    gap:16px;
    padding:12px 16px;
    border-radius:18px;
    text-decoration:none;
    color:#fff;
    background:rgba(0,0,0,.18);
    border:1px solid rgba(255,255,255,.05);
    backdrop-filter:blur(3px);
    transition:.35s;
}

.social:hover{
    transform:translateX(6px) scale(1.01);
    background:rgba(0,0,0,.28);
    box-shadow:0 0 20px rgba(255,255,255,.05);
}

.icon{
    width:56px;
    height:56px;
    border-radius:16px;
    background:rgba(255,255,255,.08);
    color:var(--light);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
}

.social-text{
    flex:1;
}

.social-text h2{
    color:var(--light);
    font-size:18px;
}

.social-text p{
    color:#cfcfcf;
    font-size:13px;
}

.arrow{
    color:var(--light);
    font-size:18px;
}

@media(max-width:1100px){
    .container{
        padding:28px 18px;
        align-items:flex-start;
    }

    .left{
        width:100%;
    }

    .title span{
        font-size:62px;
    }

    .subtitle{
        font-size:16px;
        letter-spacing:5px;
    }

    .description{
        font-size:12px;
    }
}

@media(max-width:650px){
    .title span{
        font-size:46px;
    }

    .social{
        min-height:65px;
        padding:10px 14px;
    }

    .icon{
        width:48px;
        height:48px;
        font-size:20px;
    }

    .social-text h2{
        font-size:16px;
    }

    .social-text p{
        font-size:11px;
    }
}
</style>
</head>
